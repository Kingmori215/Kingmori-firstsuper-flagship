<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旗艦店冷凍冷藏溫度記錄表</title>

<style>
body {
  font-family: sans-serif;
  padding:20px;
  background:#f5f5f5;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-top:0;
}

/* 🔥 提醒文字 */
.notice {
  font-weight:bold;
  margin-bottom:15px;
  color:#333;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

/* 🔴 異常紅框 */
input.warning {
  border:2px solid red;
  background:#fff5f5;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  transition:0.2s;
}

button:active {
  transform: scale(0.96);
}

button.loading {
  background:#999;
}

button:disabled {
  opacity:0.6;
}

#msg {
  margin-top:15px;
}

.warning-text {
  color:red;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

  <h2 id="title">設備記錄</h2>

  <div class="notice">
    每日10 / 15 / 20整點時紀錄
  </div>

  <input
    id="temp"
    type="number"
    step="0.1"
    placeholder="請輸入溫度"
  >

  <div id="alert" class="warning-text"></div>

  <input
    id="name"
    placeholder="請輸入姓名"
  >

  <input
    id="remark"
    placeholder="備註(若有異常請填寫原因)"
  >

  <button
    id="submitBtn"
    onclick="send()"
  >
    送出
  </button>

  <p id="msg"></p>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyGJZvYh2k7gwFqbQG83JPFaNjb2hcABAj_maiXnu5b5gvkoYMENIZfHdYFfuNlbZAD/exec";


// =========================
// 🔥 分頁對應溫層
// =========================

const deviceTypeMap = {

  // 冷藏
  "1": "冷藏",
  "2": "冷藏",
  "3": "冷藏",
  "4": "冷藏",
  "6": "冷藏",
  "9": "冷藏",
  "10": "冷藏",

  // 冷凍
  "5": "冷凍",
  "7": "冷凍",
  "8": "冷凍",
  "11": "冷凍",
  "12": "冷凍",
  "13": "冷凍",
  "14": "冷凍",
  "15": "冷凍",

  // 超低溫
  "16": "超低溫"
};


// =========================
// 🔥 取得設備名稱
// =========================

function getDevice(){

  return new URLSearchParams(window.location.search)
    .get("device");
}

const device = getDevice();

const tempInput =
  document.getElementById("temp");

const alertBox =
  document.getElementById("alert");


// =========================
// 🔥 取得設備溫層
// =========================

const deviceType =
  deviceTypeMap[device] || "";


// =========================
// 🔥 標題
// =========================

document.getElementById("title").innerText =
  device
    ? "設備 " + device + " 溫度記錄"
    : "⚠️ 未指定設備";


// =========================
// 🔥 溫度異常判斷
// =========================

tempInput.addEventListener("input", () => {

  const temp = parseFloat(tempInput.value);

  if(isNaN(temp)){

    alertBox.innerText = "";

    tempInput.classList.remove("warning");

    return;
  }

  // =====================
  // 冷藏
  // =====================

  if(
    deviceType === "冷藏" &&
    temp > 10
  ){

    alertBox.innerText =
      "⚠️ 溫度過高（冷藏應 ≤ 7°C）";

    tempInput.classList.add("warning");
  }

  // =====================
  // 冷凍
  // =====================

  else if(
    deviceType === "冷凍" &&
    temp > -15
  ){

    alertBox.innerText =
      "⚠️ 溫度過高（冷凍應 ≤ -18°C）";

    tempInput.classList.add("warning");
  }

  // =====================
  // 超低溫
  // =====================

  else if(
    deviceType === "超低溫" &&
    temp > -55
  ){

    alertBox.innerText =
      "⚠️ 溫度過高（超低溫應 ≤ -60°C）";

    tempInput.classList.add("warning");
  }

  else{

    alertBox.innerText = "";

    tempInput.classList.remove("warning");
  }
});


// =========================
// 🔥 送出
// =========================

function send(){

  const btn =
    document.getElementById("submitBtn");

  const msg =
    document.getElementById("msg");

  const temp =
    tempInput.value.trim();

  const name =
    document.getElementById("name")
      .value.trim();

  const remark =
    document.getElementById("remark")
      .value.trim();

  if(!device){

    msg.innerText = "❌ 沒有設備參數";

    return;
  }

  if(!temp){

    msg.innerText = "⚠️ 請輸入溫度";

    return;
  }

  if(!name){

    msg.innerText = "⚠️ 請輸入姓名";

    return;
  }

  // =====================
  // 🔥 異常必填備註
  // =====================

  const t = parseFloat(temp);

  let isAbnormal = false;

  // 冷藏
  if(
    deviceType === "冷藏" &&
    t > 10
  ){
    isAbnormal = true;
  }

  // 冷凍
  if(
    deviceType === "冷凍" &&
    t > -15
  ){
    isAbnormal = true;
  }

  // 超低溫
  if(
    deviceType === "超低溫" &&
    t > -55
  ){
    isAbnormal = true;
  }

  // 異常未填備註
  if(
    isAbnormal &&
    !remark
  ){

    msg.innerText =
      "⚠️ 異常請填寫備註";

    return;
  }

  // =====================
  // 🔥 UI 狀態
  // =====================

  btn.disabled = true;

  btn.classList.add("loading");

  btn.innerText = "送出中...";

  msg.innerText = "";

  fetch(API_URL, {

    method: "POST",

    body: new URLSearchParams({

      action: "write",

      temp: temp,

      name: name,

      remark: remark,

      device: device
    })
  })

  .then(() => {

    // =====================
    // 🔥 完成畫面
    // =====================

    document.body.innerHTML = `
      <div style="
        text-align:center;
        padding:40px;
      ">
        <h2>✅ 已送出</h2>
        <p>可直接關閉此頁面</p>
      </div>
    `;
  })

  .catch(() => {

    msg.innerText = "❌ 寫入失敗";

    btn.disabled = false;

    btn.classList.remove("loading");

    btn.innerText = "送出";
  });
}

</script>

</body>
</html>
