<script>

// =========================
// 🔥 API
// =========================

const API = "https://script.google.com/macros/s/AKfycbzXy0Bfeo0gU_SjcgBp3Jksj-74BUiL0fwCH4om0C02VaOai_rzIF2hIlCJrRwciWhu/exec";


// =========================
// 🔥 設備名稱
// =========================

const deviceNames = {

  "1":  "冷藏-咖啡機冰箱",
  "2":  "冷藏-咖啡機下方",
  "3":  "冷藏-牛奶冰箱",
  "4":  "冷藏-小農商品+退冰商品",
  "5":  "冷凍-前中島(右)",
  "6":  "冷藏-蔬菜冰箱",
  "7":  "冷凍-三門直立",
  "8":  "冷凍-後中島(右)",
  "9":  "冷藏-料理台下方",
  "10": "冷藏-後場",
  "11": "冷凍-後場",
  "12": "冷凍-後中島(左)",
  "13": "冷凍-後中島(前)",
  "14": "冷凍-前中島(左)",
  "15": "冷凍-前中島(前)",
  "16": "超低溫冰箱"
};


// =========================
// 🔥 分頁 → 溫層對應（核心修正）
// =========================

function getTempZone(device){

  const d = Number(device);

  if([1,2,3,4,6,9,10].includes(d)) return "冷藏";

  if([5,7,8,11,12,13,14,15].includes(d)) return "冷凍";

  if(d === 16) return "超低溫";

  return "";
}


// =========================
// 🔥 載入資料
// =========================

const devices = Object.keys(deviceNames);

let allRows = [];

loadAllDevices();


async function loadAllDevices(){

  let html = "";

  for(const device of devices){

    const zone = getTempZone(device);

    try {

      const res = await fetch(
        API + "?action=get&device=" + encodeURIComponent(device)
      );

      const data = await res.json();

      data.forEach(d => {
        d.device = device;
        allRows.push(d);
      });

      html += `
        <h3>
          設備${device} - ${deviceNames[device]}
        </h3>
      `;

      if(data.length === 0){

        html += `<p style="padding:10px;">⚠️ 沒有資料</p>`;
        continue;
      }

      html += `
      <table>
        <tr>
          <th>日期</th>
          <th>時間</th>
          <th>溫度</th>
          <th>人員</th>
          <th>備註</th>
          <th>複核</th>
        </tr>
      `;

      data.forEach(d => {

        let t = "";
        if(d.time){
          let time = new Date(d.time);
          t = time.getHours().toString().padStart(2,'0') + ":" +
              time.getMinutes().toString().padStart(2,'0');
        }

        const temp = parseFloat(d.temp);
        let tempClass = "";

        // =========================
        // 🔥 溫層合規判斷（修正版）
        // =========================

        if(zone === "冷藏" && temp > 10){
          tempClass = "temp-danger";
        }

        else if(zone === "冷凍" && temp > -15){
          tempClass = "temp-danger";
        }

        else if(zone === "超低溫" && temp > -55){
          tempClass = "temp-danger";
        }

        let checkInfo = "未複核";
        let rowClass = "unchecked";

        if(d.checker){

          let dateStr = "";
          let timeStr = "";

          if(d.checkDate){
            let cd = new Date(d.checkDate);
            dateStr =
              cd.getFullYear() + "/" +
              (cd.getMonth()+1).toString().padStart(2,'0') + "/" +
              cd.getDate().toString().padStart(2,'0');
          }

          if(d.checkTime){
            let ct = new Date(d.checkTime);
            timeStr =
              ct.getHours().toString().padStart(2,'0') + ":" +
              ct.getMinutes().toString().padStart(2,'0');
          }

          checkInfo = `${d.checker}<br>${dateStr} ${timeStr}`;
          rowClass = "checked";
        }

        html += `
        <tr class="${rowClass}">
          <td>${d.date}</td>
          <td>${t}</td>
          <td class="${tempClass}">${d.temp}°C</td>
          <td>${d.name}</td>
          <td>${d.remark || ""}</td>
          <td>${checkInfo}</td>
        </tr>
        `;
      });

      html += "</table>";

    } catch(e){

      html += `
        <h3>設備${device} - ${deviceNames[device]}</h3>
        <p>❌ 讀取失敗</p>
      `;
    }
  }

  document.getElementById("tableArea").innerHTML = html;

  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
}


// =========================
// 🔥 複核
// =========================

async function submitCheck(){

  const btn = document.getElementById("btn");
  const checker = document.getElementById("checker").value.trim();

  if(!checker){
    alert("請輸入複核者姓名");
    return;
  }

  btn.disabled = true;
  btn.classList.add("loading");
  btn.innerText = "送出中...";

  try {

    for(const r of allRows){

      if(!r.checker){

        await fetch(API, {
          method: "POST",
          body: new URLSearchParams({
            action: "check",
            device: r.device,
            row: r.row,
            checker: checker
          })
        });
      }
    }

    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">
        <div>
          <h1>✅ 全部設備複核完成</h1>
          <p>可直接關閉此頁面</p>
        </div>
      </div>
    `;

  } catch(e){

    alert("複核失敗");

    btn.disabled = false;
    btn.classList.remove("loading");
    btn.innerText = "確認全部複核";
  }
}

</script>
